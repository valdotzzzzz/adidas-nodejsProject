<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adidas | Your Cart</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/layout.js"></script>
</head>
<body>

    <section class="products-section">
        <div class="section-header">
            <div>
                <div class="section-label">Shopping</div>
                <h2 class="section-title">Your Cart</h2>
            </div>
        </div>

        <div id="cart-loading" style="padding: 60px 0; text-align: center; color: #888;">
            Loading your cart...
        </div>

        <div id="cart-empty" style="display:none; padding: 80px 0; text-align: center;">
            <p style="font-size: 20px; font-weight: 800; text-transform: uppercase; margin-bottom: 12px;">Your Cart is Empty</p>
            <p style="color: #888; margin-bottom: 24px;">Looks like you haven't added any shoes yet.</p>
            <a href="shop.html" class="btn btn-dark" style="padding: 14px 28px;">Start Shopping</a>
        </div>

        <div id="cart-layout" style="display:none; display:grid; grid-template-columns: 1fr 360px; gap: 40px;">

            <div id="cart-items"></div>

            <div style="background:#f5f5f5; padding: 28px; align-self: start;">
                <h3 style="font-size: 18px; font-weight: 800; text-transform: uppercase; margin-bottom: 20px;">Order Summary</h3>

                <div style="display:flex; justify-content:space-between; font-size:14px; margin-bottom:12px;">
                    <span>Subtotal</span>
                    <span id="cart-subtotal">₱0.00</span>
                </div>
                <div style="display:flex; justify-content:space-between; font-size:14px; margin-bottom:20px; padding-bottom:16px; border-bottom:1px solid #ddd;">
                    <span>Shipping</span>
                    <span id="cart-shipping">₱150.00</span>
                </div>
                <div style="display:flex; justify-content:space-between; font-size:18px; font-weight:800; margin-bottom:24px;">
                    <span>Total</span>
                    <span id="cart-total">₱0.00</span>
                </div>

                <button id="checkoutBtn" class="btn btn-primary" style="width:100%; padding:16px;">Proceed to Checkout</button>
            </div>

        </div>

    </section>

    <script src="js/cart.js"></script>
</body>
</html>
