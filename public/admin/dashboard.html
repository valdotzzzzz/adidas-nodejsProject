<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adidas Admin | Management Panel</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
</head>
<body class="admin-body">

    <aside class="admin-sidebar">
        <div class="sidebar-header">
            <svg height="28" viewBox="0 0 24 24" width="28" fill="currentColor">
                <path d="M24 19.33H17.74L14.12 12.35L20.38 5.37H24L16.48 13.8L20.38 21.32M15.42 19.33H9.16L6.46 14.12L11.83 8.08H15.41L9.16 15.11L11.83 20.32M6.84 19.33H0.58L3.25 14.28H6.84L4.17 19.33Z"/>
            </svg>
            <span class="sidebar-brand">ADMIN PANEL</span>
        </div>
        <nav class="sidebar-nav">
            <div class="nav-section-title">Overview</div>
            <a href="dashboard.html" class="nav-item active">📊 Dashboard</a>
            
            <div class="nav-section-title">Catalogue</div>
            <a href="#" class="nav-item" id="nav-products">👟 Products</a>
            <a href="#" class="nav-item">🏷️ Categories</a>
            
            <div class="nav-section-title">Account</div>
            <a href="../index.html" class="nav-item">🌐 Storefront</a>
            <button id="adminLogoutBtn" class="nav-item logout-btn">🚪 Sign Out</button>
        </nav>
    </aside>

    <main class="admin-main-content">
        <div class="section-header" style="margin-bottom: 30px;">
            <div>
                <div class="section-label">Inventory Control Matrix</div>
                <h2 class="section-title">Manage Products</h2>
            </div>
            <button class="btn btn-primary" id="openCreateModalBtn" style="padding: 10px 20px; font-size: 12px;">+ Add Product</button>
        </div>

        <div class="table-card" style="background-color: #111111; padding: 24px; border: 1px solid #1a1a1a;">
            <table id="productsSecureTable" class="display" style="width:100%">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Style Code</th>
                        <th>Name</th>
                        <th>Category</th>
                        <th>Gender</th>
                        <th>Price</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    </tbody>
            </table>
        </div>
    </main>

    <script src="../js/admin-dashboard.js"></script>
</body>
</html>
